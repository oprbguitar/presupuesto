name: Actualizar datos de Contrataciones públicas

# Actualiza los JSON del módulo de contrataciones de forma desacoplada.
# Regla clave: si la validación o la detección de cambios falla, NO se publica nada.

on:
  workflow_dispatch:      # ejecución manual desde la pestaña Actions
  schedule:
    - cron: "0 6 * * 1"   # cada lunes 06:00 UTC (~01:00 Perú)

permissions:
  contents: write

concurrency:
  group: contrataciones-data
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/contrataciones
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Preparar configuración
        run: |
          if [ ! -f config.json ]; then cp config.example.json config.json; fi

      # 1) Descargar las fuentes disponibles (no falla el job si una fuente no responde)
      - name: Descargar fuentes
        id: descarga
        continue-on-error: true
        run: |
          python descargar_oece.py --anios 2023 2024 2025 2026 || echo "OECE: sin datos nuevos"
          python descargar_mef.py  --anios 2023 2024 2025 2026 || echo "MEF: sin datos nuevos"

      # 2) Validar la ESTRUCTURA de las fuentes (bloqueante ante cambios de formato)
      - name: Detectar cambios de estructura
        id: esquema
        run: python detectar_cambios.py

      # 3) Normalización: catálogos y procesamiento OCDS / Perú Compras
      - name: Normalizar y procesar
        run: |
          python catalogo_entidades.py
          python procesar_ocds.py       --anios 2023 2024 2025 2026 || echo "Sin paquetes OCDS crudos"
          python perucompras_ordenes.py --anios 2023 2024 2025 2026 || echo "Sin órdenes Perú Compras"
          python catalogo_proveedores.py --anios 2023 2024 2025 2026

      # 4) Generar los JSON públicos (agregados + manifiesto con fecha de actualización)
      - name: Generar agregados y manifiesto
        run: python generar_agregados.py --anios 2023 2024 2025 2026 --parcial 2026

      # 5) Validación de los JSON públicos (bloqueante)
      - name: Validar JSON públicos
        id: validar
        run: python validar.py

      # 6) Publicar solo si TODO lo anterior fue correcto
      - name: Publicar cambios
        if: success()
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contrataciones/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "datos(contrataciones): actualización automática $(date -u +%Y-%m-%d)"
            git push
          fi

      # 7) Log de errores y cambios de formato como artefacto (siempre)
      - name: Publicar log del pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: |
            scripts/contrataciones/pipeline.log
            scripts/contrataciones/_estado/esquemas.json
          if-no-files-found: ignore
          retention-days: 30
